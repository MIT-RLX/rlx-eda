[package]
name         = "spike-sample-hold"
version      = "0.0.1"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true

# CMOS transmission-gate sample-and-hold for the SAR ADC. NMOS+PMOS
# pass switch in parallel + hold capacitor; the NMOS handles the
# low-side rail, the PMOS the high-side, so the TG passes the full
# rail-to-rail swing without the threshold-loss a single NMOS switch
# would suffer near vdd.

[features]
ngspice = ["dep:eda-extern-ngspice"]
ltspice = ["dep:eda-extern-ltspice"]

[dependencies]
spike-cmos-gates    = { workspace = true }
spike-divider-block = { workspace = true }
eda-spice-emit      = { workspace = true }
eda-validate        = { workspace = true }
eda-mna             = { workspace = true }

[dependencies.eda-extern-ngspice]
workspace = true
optional  = true

[dependencies.eda-extern-ltspice]
workspace = true
optional  = true

[dev-dependencies]
eda-waveform = { workspace = true }
