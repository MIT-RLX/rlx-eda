[package]
name         = "spike-tline-termination"
version      = "0.0.1"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true

[features]
ngspice = ["dep:eda-extern-ngspice"]
report  = ["ngspice", "dep:eda-waveform"]

[dependencies]
eda-hir            = { workspace = true }
eda-spice-emit     = { workspace = true }
eda-validate       = { workspace = true }
eda-extern-ngspice = { workspace = true, optional = true }
eda-waveform       = { workspace = true, optional = true }

[[bin]]
name = "spike-tline-termination"
path = "src/main.rs"

[[bin]]
name = "report"
path = "src/bin/report.rs"
required-features = ["report"]
