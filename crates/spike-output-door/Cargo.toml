[package]
name         = "spike-output-door"
version      = "0.0.1"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true

# LTspice paper Fig 11.1: N-bit parallel-in / parallel-out latch built
# from N Dffs sharing one clock. Used in the SAR ADC top-level to
# sample the conversion result at the end of each cycle.

[dependencies]
spike-cmos-gates = { workspace = true }
eda-spice-emit   = { workspace = true }
eda-validate     = { workspace = true }

[features]
ngspice = ["dep:eda-extern-ngspice"]
ltspice = ["dep:eda-extern-ltspice"]

[dependencies.eda-extern-ngspice]
workspace = true
optional  = true

[dependencies.eda-extern-ltspice]
workspace = true
optional  = true

[dev-dependencies]
eda-waveform = { workspace = true }
