# bench.example.toml
#
# Reference TOML for `BenchConfig`. Every section + field is shown
# at its in-code default; commenting out a line falls back to the
# default. Copy this to `bench.toml` and edit. Multi-config
# workflows: keep one TOML per scenario (e.g. `bench-tt.toml`,
# `bench-ss.toml`, `bench-pnr-on.toml`) and switch via the
# `BENCH_CONFIG` env var or CLI arg.
#
# Adding a new section: see `crates/eda-bench-tinyconv/src/config.rs`
# "Adding a new section" doc.

[run]
# Optimizer seed — recorded in the manifest, threaded into every
# Adam loop for reproducibility.
seed = 0
# Where the bench writes its markdown report. Demo binary resolves
# this relative to the workspace root.
output_path = "target/bench/demo/report.md"

[loss_weights]
alpha_energy = 1.0
beta_delay = 0.5
gamma_area = 0.25
lambda_acc = 100.0
epsilon_acc_pp = 0.5
# When set, replaces the placeholder `N_CELLS · A0_PER_CELL`
# constant in the area residual with a real foundry sum. Bench
# usually fills this from `LossWeights::with_inhouse_baseline`.
# area_baseline_um2 = 3000.356

[inner]
max_steps = 200
learning_rate = 0.05

[inner.min_params]
w_l_n = 0.1
w_l_p = 0.1
vdd = 0.6
bias_v = 0.0
weight_bits = 8

[inner.max_params]
w_l_n = 5.0
w_l_p = 5.0
vdd = 1.95
bias_v = 0.0
weight_bits = 8

[outer]
max_rounds = 200
# Run ORFS validation every N outer rounds; cheaper rounds in
# between use the FPGA-injected accuracy proxy.
orfs_cadence = 10

[pnr]
# Toggle: true → run Adam-on-HPWL on the controller netlist after
# the inner tile loop. false → no-op (default).
enabled = false

[pnr.adam]
max_steps = 200
learning_rate = 5000.0
beta = 0.0001

[noise]
vdd_nominal = 1.8
k_vdd = 4.0
k_pelgrom = 0.6
k_thermal = 0.2
k_acc_pp_per_lsb = 0.5
last_calibration_residual = 0.0

[inference]
# End-to-end inference performance bench. Times
# `rlx_fpga::reference::run` over a configurable batch.
n_images = 100
warmup = 10
repetitions = 3

[bundle]
# When `merge_weights = true`, the bench writes a single bundled
# artifact at `output_path` (tarball with `top.sv` + `weights/*.mem`
# + `manifest.toml`). When false, caller writes files separately
# (standard FPGA workflow). ASIC mask-ROM convention is `true`.
merge_weights = false
output_path = "target/bench/demo/bundle.tar"
# `tarball` (works today) | `inline_sv` (weights baked into
# SystemVerilog `localparam`s — pending v1.5).
format = "tarball"
