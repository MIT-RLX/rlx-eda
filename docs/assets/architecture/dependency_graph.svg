<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif">
  <defs>
    <!-- soft drop shadow for cards -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arr-rlx" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#4f46e5"/>
    </marker>
    <marker id="arr-kl" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#b45309"/>
    </marker>

    <!-- rlx logo: 3×3 differentiable tensor grid with two dots highlighted -->
    <symbol id="logo-rlx" viewBox="0 0 64 64">
      <rect x="2" y="2" width="60" height="60" rx="14" fill="#eef2ff"/>
      <g fill="#4f46e5">
        <circle cx="18" cy="18" r="4"/>
        <circle cx="32" cy="18" r="4"/>
        <circle cx="46" cy="18" r="4"/>
        <circle cx="18" cy="32" r="4"/>
        <circle cx="46" cy="32" r="4"/>
        <circle cx="18" cy="46" r="4"/>
        <circle cx="32" cy="46" r="4"/>
        <circle cx="46" cy="46" r="4"/>
      </g>
      <circle cx="32" cy="32" r="6" fill="#4f46e5"/>
      <circle cx="32" cy="32" r="2.4" fill="#eef2ff"/>
    </symbol>

    <!-- klayout-rs logo: stacked layout layers with via -->
    <symbol id="logo-kl" viewBox="0 0 64 64">
      <rect x="2" y="2" width="60" height="60" rx="14" fill="#fff7ed"/>
      <rect x="12" y="42" width="40" height="8" rx="1.5" fill="#b45309"/>
      <rect x="14" y="30" width="36" height="8" rx="1.5" fill="#d97706" opacity="0.9"/>
      <rect x="16" y="18" width="32" height="8" rx="1.5" fill="#f59e0b" opacity="0.85"/>
      <rect x="30" y="22" width="4" height="24" fill="#7c2d12"/>
    </symbol>

    <!-- rlx-eda logo: chip die with pins -->
    <symbol id="logo-eda" viewBox="0 0 64 64">
      <rect x="2" y="2" width="60" height="60" rx="14" fill="#ecfdf5"/>
      <!-- pins -->
      <g fill="#047857">
        <rect x="6"  y="20" width="6" height="3"/>
        <rect x="6"  y="30" width="6" height="3"/>
        <rect x="6"  y="40" width="6" height="3"/>
        <rect x="52" y="20" width="6" height="3"/>
        <rect x="52" y="30" width="6" height="3"/>
        <rect x="52" y="40" width="6" height="3"/>
        <rect x="20" y="6"  width="3" height="6"/>
        <rect x="30" y="6"  width="3" height="6"/>
        <rect x="40" y="6"  width="3" height="6"/>
        <rect x="20" y="52" width="3" height="6"/>
        <rect x="30" y="52" width="3" height="6"/>
        <rect x="40" y="52" width="3" height="6"/>
      </g>
      <!-- die -->
      <rect x="14" y="14" width="36" height="36" rx="3" fill="#10b981"/>
      <rect x="20" y="20" width="24" height="24" rx="2" fill="#ecfdf5"/>
      <text x="32" y="37" text-anchor="middle" font-size="13" font-weight="800" fill="#047857" font-family="monospace">eda</text>
    </symbol>
  </defs>

  <!-- background -->
  <rect width="1200" height="800" fill="#fafafa"/>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#e5e7eb" stroke-width="0.5" opacity="0.6">
    <path d="M0 200 H1200 M0 400 H1200 M0 600 H1200"/>
  </g>

  <!-- Header -->
  <text x="600" y="62" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a" letter-spacing="-0.5">
    Workspace dependency graph
  </text>
  <text x="600" y="88" text-anchor="middle" font-size="14" fill="#64748b">
    Three sibling Cargo workspaces. <tspan font-weight="600" fill="#334155">rlx-eda</tspan> consumes both upstreams; the upstreams never see each other.
  </text>

  <!-- ============== rlx card (top-left) ============== -->
  <g filter="url(#shadow)">
    <rect x="80" y="140" width="440" height="240" rx="16" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
  </g>
  <use href="#logo-rlx" x="108" y="168" width="64" height="64"/>
  <text x="190" y="196" font-size="22" font-weight="700" fill="#312e81" letter-spacing="-0.3">rlx</text>
  <text x="190" y="218" font-size="12" font-weight="600" fill="#4f46e5" font-family="ui-monospace, 'SF Mono', monospace">github.com/MIT-RLX/rlx</text>
  <text x="190" y="240" font-size="13" fill="#475569">JAX-shaped differentiable arrays · GPU runtime</text>

  <!-- chips: domains -->
  <g font-size="11" font-weight="600">
    <rect x="108" y="258" width="84" height="24" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="150" y="275" text-anchor="middle" fill="#3730a3">autodiff</text>

    <rect x="200" y="258" width="84" height="24" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="242" y="275" text-anchor="middle" fill="#3730a3">tensors</text>

    <rect x="292" y="258" width="84" height="24" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="334" y="275" text-anchor="middle" fill="#3730a3">runtime</text>

    <rect x="384" y="258" width="100" height="24" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="434" y="275" text-anchor="middle" fill="#3730a3">MLX · CPU · …</text>
  </g>

  <text x="108" y="312" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">CONSUMED CRATES</text>
  <text x="108" y="332" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">rlx-runtime · rlx-ir · rlx-opt · rlx-mlx</text>
  <text x="108" y="350" font-size="11" fill="#94a3b8" font-style="italic">no circuit logic — kept generic</text>

  <!-- ============== klayout-rs card (top-right) ============== -->
  <g filter="url(#shadow)">
    <rect x="680" y="140" width="440" height="240" rx="16" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  </g>
  <use href="#logo-kl" x="708" y="168" width="64" height="64"/>
  <text x="790" y="196" font-size="22" font-weight="700" fill="#7c2d12" letter-spacing="-0.3">klayout-rs</text>
  <text x="790" y="218" font-size="12" font-weight="600" fill="#b45309" font-family="ui-monospace, 'SF Mono', monospace">github.com/MIT-RLX/klayout-rs</text>
  <text x="790" y="240" font-size="13" fill="#475569">Physical / layout stack · GDS · DRC · P&amp;R</text>

  <g font-size="11" font-weight="600">
    <rect x="708" y="258" width="84" height="24" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="750" y="275" text-anchor="middle" fill="#7c2d12">geometry</text>

    <rect x="800" y="258" width="84" height="24" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="842" y="275" text-anchor="middle" fill="#7c2d12">PDK · DRC</text>

    <rect x="892" y="258" width="84" height="24" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="934" y="275" text-anchor="middle" fill="#7c2d12">place · route</text>

    <rect x="984" y="258" width="100" height="24" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="1034" y="275" text-anchor="middle" fill="#7c2d12">GDS · LEF I/O</text>
  </g>

  <text x="708" y="312" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">CONSUMED CRATES</text>
  <text x="708" y="332" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">klayout-core · -io · -geom · -pdk · -route · -drc</text>
  <text x="708" y="350" font-size="11" fill="#94a3b8" font-style="italic">does not depend on rlx</text>

  <!-- "independent" rail between top cards -->
  <line x1="520" y1="260" x2="680" y2="260" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <g>
    <rect x="555" y="246" width="90" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="264" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">INDEPENDENT</text>
  </g>

  <!-- ============== rlx-eda card (bottom) ============== -->
  <g filter="url(#shadow)">
    <rect x="80" y="430" width="1040" height="304" rx="18" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <use href="#logo-eda" x="108" y="458" width="64" height="64"/>
  <text x="190" y="486" font-size="22" font-weight="700" fill="#064e3b" letter-spacing="-0.3">rlx-eda</text>
  <text x="190" y="508" font-size="12" font-weight="600" fill="#047857" font-family="ui-monospace, 'SF Mono', monospace">github.com/MIT-RLX/rlx-eda</text>
  <text x="190" y="530" font-size="13" fill="#475569">Code-defined EDA: MNA · PINN · floorplan · P&amp;R · validation spikes</text>

  <!-- three sub-domains as inner panels -->
  <!-- analysis (rlx-only) -->
  <g>
    <rect x="108" y="548" width="320" height="158" rx="12" fill="#fafafa" stroke="#e2e8f0"/>
    <circle cx="138" cy="570" r="6" fill="#4f46e5"/>
    <text x="154" y="575" font-size="13" font-weight="700" fill="#0f172a">Analysis &amp; numerics</text>
    <text x="124" y="600" font-size="11" font-weight="600" fill="#4f46e5" letter-spacing="0.4">USES rlx</text>
    <text x="124" y="621" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">eda-mna · eda-pinn · eda-nn</text>
    <text x="124" y="639" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">eda-trace · eda-vfit</text>
    <text x="124" y="660" font-size="11" fill="#64748b">spike-mosfet-dc · spike-comparator</text>
    <text x="124" y="677" font-size="11" fill="#64748b">spike-pinn-{rc,diode,sar,sar-mc}</text>
    <text x="124" y="691" font-size="11" fill="#94a3b8" font-style="italic">…and ~12 more analysis spikes</text>
  </g>

  <!-- bridge (uses both) -->
  <g>
    <rect x="448" y="548" width="320" height="158" rx="12" fill="#fefce8" stroke="#fde68a"/>
    <circle cx="478" cy="570" r="6" fill="#4f46e5"/>
    <circle cx="492" cy="570" r="6" fill="#b45309"/>
    <text x="506" y="575" font-size="13" font-weight="700" fill="#0f172a">Bridge</text>
    <text x="464" y="600" font-size="11" font-weight="600" fill="#854d0e" letter-spacing="0.4">USES BOTH</text>
    <text x="464" y="621" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">eda-floorplan · eda-pnr · eda-hir</text>
    <text x="464" y="639" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">eda-bench-tinyconv · eda-viz</text>
    <text x="464" y="660" font-size="11" fill="#64748b">spike-tinyconv-{array, tile}</text>
    <text x="464" y="677" font-size="11" fill="#64748b">spike-divider-block · spike-lna</text>
    <text x="464" y="691" font-size="11" fill="#94a3b8" font-style="italic">tensor-shaped synth → GDS emit</text>
  </g>

  <!-- physical (klayout-only) -->
  <g>
    <rect x="788" y="548" width="320" height="158" rx="12" fill="#fafafa" stroke="#e2e8f0"/>
    <circle cx="818" cy="570" r="6" fill="#b45309"/>
    <text x="834" y="575" font-size="13" font-weight="700" fill="#0f172a">Physical &amp; layout</text>
    <text x="804" y="600" font-size="11" font-weight="600" fill="#b45309" letter-spacing="0.4">USES klayout-rs</text>
    <text x="804" y="621" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">eda-drc · eda-pex · eda-extract</text>
    <text x="804" y="639" font-size="12" fill="#334155" font-family="ui-monospace, 'SF Mono', monospace">eda-pdks · eda-stdcells · eda-tile</text>
    <text x="804" y="660" font-size="11" fill="#64748b">spike-divider-layout · spike-dado-r2r</text>
    <text x="804" y="677" font-size="11" fill="#64748b">spike-lelo-ex</text>
    <text x="804" y="691" font-size="11" fill="#94a3b8" font-style="italic">DRC decks · GDS writers · sky130 / IHP</text>
  </g>

  <!-- arrows from rlx-eda → upstreams (curved, anchored to inner panel labels) -->
  <!-- analysis → rlx -->
  <path d="M 268 548 C 268 480 285 420 300 380" fill="none" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#arr-rlx)"/>
  <!-- bridge → rlx -->
  <path d="M 540 548 C 540 490 480 430 410 380" fill="none" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#arr-rlx)"/>
  <!-- bridge → klayout-rs -->
  <path d="M 670 548 C 670 490 770 430 830 380" fill="none" stroke="#b45309" stroke-width="2.4" marker-end="url(#arr-kl)"/>
  <!-- physical → klayout-rs -->
  <path d="M 940 548 C 940 480 925 420 920 380" fill="none" stroke="#b45309" stroke-width="2.4" marker-end="url(#arr-kl)"/>

  <!-- depends-on tags on the arrows -->
  <g>
    <rect x="244" y="394" width="92" height="22" rx="11" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="290" y="409" text-anchor="middle" font-size="11" font-weight="600" fill="#4338ca">depends on rlx</text>
  </g>
  <g>
    <rect x="858" y="394" width="138" height="22" rx="11" fill="#ffffff" stroke="#fed7aa"/>
    <text x="927" y="409" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">depends on klayout-rs</text>
  </g>

  <!-- footer legend -->
  <g transform="translate(80, 768)">
    <circle cx="6" cy="0" r="6" fill="#4f46e5"/>
    <text x="20" y="4" font-size="12" fill="#475569">rlx — autodiff &amp; arrays</text>

    <circle cx="206" cy="0" r="6" fill="#b45309"/>
    <text x="220" y="4" font-size="12" fill="#475569">klayout-rs — layout &amp; PDK</text>

    <circle cx="426" cy="0" r="6" fill="#10b981"/>
    <text x="440" y="4" font-size="12" fill="#475569">rlx-eda — circuit-specific glue</text>

    <text x="900" y="4" font-size="11" fill="#94a3b8" text-anchor="end">all edges are Cargo path-deps</text>
  </g>
</svg>
